<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Dashboard | Career Insights</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        :root { --navy: #003366; --light-bg: #f4f7f6; }
        body { background-color: var(--light-bg); font-family: 'Poppins', sans-serif; }
        .bg-navy { background-color: var(--navy) !important; }
        .card-action { 
            transition: all 0.3s ease; 
            cursor: pointer; 
            border: none; 
            border-radius: 20px;
        }
        .card-action:hover { 
            transform: translateY(-10px); 
            box-shadow: 0 15px 30px rgba(0,0,0,0.1) !important; 
        }
        .icon-box {
            width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 15px; margin-bottom: 20px;
        }
        .profile-section { background: white; border-radius: 0 0 30px 30px; }
        .badge-verified { background-color: #e3f2fd; color: #1976d2; font-size: 0.75rem; font-weight: bold; }
    </style>
</head>
